<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Primary Meta Tags -->
  <title>AetherChat — Decentralized P2P Chat</title>
  <meta name="title" content="AetherChat — Decentralized P2P Chat" />
  <meta name="description" content="AetherChat is a free, open-source, peer-to-peer chat platform. No servers. No tracking. End-to-end encrypted private messages. Connect globally without giving up your privacy." />
  <meta name="keywords" content="p2p chat, decentralized chat, encrypted chat, private messaging, webrtc chat, anonymous chat, no server chat, open source chat" />
  <meta name="author" content="CodeWithBotinaOficial" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0f1117" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://aetherchat.codewithbotina.com" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aetherchat.codewithbotina.com" />
  <meta property="og:title" content="AetherChat — Decentralized P2P Chat" />
  <meta property="og:description" content="Free, open-source peer-to-peer chat. No servers, no tracking, end-to-end encrypted. Connect globally without giving up your privacy." />
  <meta property="og:image" content="https://aetherchat.codewithbotina.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:site_name" content="AetherChat" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://aetherchat.codewithbotina.com" />
  <meta name="twitter:title" content="AetherChat — Decentralized P2P Chat" />
  <meta name="twitter:description" content="Free, open-source peer-to-peer chat. No servers, no tracking, end-to-end encrypted." />
  <meta name="twitter:image" content="https://aetherchat.codewithbotina.com/og-image.png" />

  <!-- PWA / App Meta -->
  <meta name="application-name" content="AetherChat" />
  <meta name="apple-mobile-web-app-title" content="AetherChat" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "AetherChat",
    "url": "https://aetherchat.codewithbotina.com",
    "description": "Decentralized peer-to-peer chat platform with end-to-end encryption. No servers, no tracking, no account required.",
    "applicationCategory": "CommunicationApplication",
    "operatingSystem": "Any (Browser-based)",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "CodeWithBotinaOficial",
      "url": "https://github.com/CodeWithBotinaOficial"
    },
    "featureList": [
      "Peer-to-peer communication",
      "End-to-end encryption",
      "No account required",
      "No data collection",
      "Open source"
    ]
  }
  </script>

  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
