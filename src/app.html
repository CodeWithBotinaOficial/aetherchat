<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			:root {
				/* Backgrounds */
				--bg-base: #0f1117;
				--bg-surface: #1a1d27;
				--bg-elevated: #22263a;
				--bg-overlay: #2a2f47;
				--bg-dim: rgba(15, 17, 23, 0.72);

				/* Text */
				--text-primary: #e8eaf0;
				--text-secondary: #8b90a8;
				--text-muted: #555b78;

				/* Accent */
				--accent: #6c8ef5;
				--accent-hover: #8aaaf8;
				--accent-subtle: #1e2d5a;

				/* Semantic */
				--success: #4ade80;
				--warning: #facc15;
				--danger: #f87171;

				/* Borders */
				--border: #2e3350;
				--border-focus: #6c8ef5;

				/* Spacing scale */
				--space-xs: 4px;
				--space-sm: 8px;
				--space-md: 16px;
				--space-lg: 24px;
				--space-xl: 40px;
				--space-2xl: 64px;

				/* Typography */
				--font-sans: 'Inter', system-ui, sans-serif;
				--font-mono: 'JetBrains Mono', monospace;
				--font-size-xs: 0.75rem;
				--font-size-sm: 0.875rem;
				--font-size-base: 1rem;
				--font-size-lg: 1.125rem;
				--font-size-xl: 1.25rem;

				/* Radius */
				--radius-sm: 6px;
				--radius-md: 12px;
				--radius-lg: 18px;
				--radius-full: 9999px;

				/* Shadows */
				--shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
				--shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
				--shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.6);
			}

			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				background: var(--bg-base);
				color: var(--text-primary);
				font-family: var(--font-sans);
				font-size: var(--font-size-base);
			}

			* {
				box-sizing: border-box;
			}

			::selection {
				background: var(--accent-subtle);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
